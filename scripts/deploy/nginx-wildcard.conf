server {
    listen 80;
    listen [::]:80;
    
    # Change example.com and *.example.com to your actual domain name
    server_name example.com *.example.com;
    
    # Path to the public directory of your Laravel application
    root /var/www/reviewer/public;

    # Headers for security and optimization
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    index index.php;

    charset utf-8;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # Route request to public/index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Disable logging for icons and robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # Pass PHP files to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Buffer optimizations
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block access to hidden files/folders (except .well-known)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
